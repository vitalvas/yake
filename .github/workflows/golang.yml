# generated by: yake code github-lang-golang
name: golang
on:
  workflow_dispatch: {}
  merge_group:
    types:
      - checks_requested
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**.go'
      - go.mod
      - go.sum
  push:
    paths:
      - '**.go'
      - go.mod
      - go.sum
concurrency:
  group: go-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.event.action != 'merge_group' }}
jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=5m --output.text.path=lint-report.txt
      - name: golangci-lint output
        if: always()
        run: |-
          cat lint-report.txt
          cat lint-report.txt >> "$GITHUB_STEP_SUMMARY"
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test
        run: go test -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Test Race
        run: go test -race ./...
      - name: Check codecov token
        id: check-codecov
        run: if [ -n "$CODECOV_TOKEN" ]; then echo "available=true" >> "$GITHUB_OUTPUT"; fi
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Publish coverage
        if: steps.check-codecov.outputs.available == 'true'
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.txt
